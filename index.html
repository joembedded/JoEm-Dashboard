<html lang="en">

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta meta property=“og:title“ content=“Dashboard“ />
    <meta property="og:description" content="Template-Fragment for Dashboards" />
    <meta name="description" content="Template-Fragment for Dashboards" />
    <!-- Pfad zeigt auf volle URL (nur dann als Link immer korrekt darstellbar) -->
    <meta property="og:image" content="https://joembedded.github.io/JoEm-Dashboard/static/preview.png" />

    <!-- - App Icon entweder als Icon or SVG: -->
    <link rel="icon" type="image/svg+xml" href="./static/favicon.svg">
    <!-- <link rel="icon" type="image/x-icon" href="./static/favicon.ico">  -->

    <link rel="stylesheet" href="./fontawesome/css/all.min.css">
    <!-- Basis-Funktionalitaet des Dashbords: -->
    <link rel="stylesheet" href="./css/joemdash.css">
    <!-- BarcodeDetector - Scanner-Dialog -->
    <link rel="stylesheet" href="./css/qrscanner.css">

    <title>BLX Dash</title>

</head>

<body class="shcontainer"> <!-- BODY START -->

    <header class="cheader">
        <i class="fa fa-fw fa-bars " id="sidebar_menue"></i>
        <span class="cheader-txt"><b>BLX Dashboard</b></span>
    </header>

    <div class="ccontent">
        <div class="hccontainer">
            <nav id="sidebar_left" class="clnav">
                <div class="navinfo"><b>Main</b></div>

                <!-- Navigatiins-item besteht immer aus 2 oder 3 Elementen: -->
                <button id="button0-link" class="navitem" style="color:blue">
                    <i class="fa-brands fa-fw fa-bluetooth"></i>
                    <span class="navitem-txt">Connect</span>
                    <span class="navitem-pointout" style="background-color:gray;" hidden>
                        -xx dBm
                    </span>
                </button>

                <button class="navitem" disabled>
                    <!-- class="navhidden" for Weg-Hidden.. disabled fuer halbhell, hidden fuer unsichtbar -->
                    <i class="fa-solid fa-fw fa-file-waveform"></i>                
                    <span class="navitem-txt">(None)</span>
                </button>

                <div class="thin-hr"></div>

            </nav>

            <div id="main_content" class="ucontent">
                <div id="section_main" class="usection">
                    <div id="section_main_menue"> <!-- Top-Schnellstartleiste -->
                        <button onclick="location.href='#section_terminal'"> <i class="fa-regular fa-keyboard"></i>
                            Terminal</a> </button>
                    </div>
                    MainContent<br>
                    <button id="testping">PING</button>
                    <button id="testscan">SCAN</button>

                </div>

                <div id="section_terminal" class="usection">
                    <div id="section_teminal_menue"> <!-- Top-Schnellstartleiste -->
                        <button onclick="location.href='#section_main'"> <i class="fa-solid fa-house"></i>
                            Top</a> </button>
                    </div>
                    Terminal
                    <div id="blxTerminal"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="cfooter">
        Footer
    </footer>

    <!-- Dialog Elements <dialog> / Modal new in HTML5 -->
    <dialog id='qrscanner-dialog'>
        <video style="display: none;" id='qroriginal-video' playsinline mute></video>
        <div id='qrvideo-header'><select id='qrcam-selector'></select></div>
        <button id='qrscanner-btnClose'>&#10006;</button>
        <button id='qrscanner-btnTorch'>&#x1F4A1;</button>
        <div style='text-align:center;'><canvas id='qrscaled-videocanvas'></canvas></div>
    </dialog>

</body> <!-- BODY END -->

<script type="module">
    import * as JD from './js/joemdash.js'
    import * as QRS from './js/qrscanner.js'
    import './js/jsQR.min.js' // Polyfill for Desktop
    import * as I18 from './js/i18n.js'
    import './js/blx.js' // *todo* './js/blx.min.js'
    import './js/blStore.min.js' 

    //--------- globals ------ 
    let connectionLevel = 0
    let advertisingName
    let blxDevice

    var urlpar = {} // Aufruf-Parameter, z.B. urlpar.test = abc fuer ?test=abc


    //================ TESTSACHEN ANFANG ============
    function testping() {
        blx.chordsound(440, 0.3, 0.1)

        let b = document.getElementById('button0-link')
        console.log(b.querySelector('i').classList.toggle('fa-beat'))

    }
    document.getElementById('testping').addEventListener('click', testping)

    async function testscan() {
        QRS.clearScannedResults()
        await QRS.openSelectedCamera() // Implizit initCameras falls noetig, nicht aber beide!
        await QRS.scannerBusy()
    }
    document.getElementById('testscan').addEventListener('click', testscan)
    //================ TESTSACHEN ENDE ============

    // BLE Callback Callback currently to Console only  m:Message, v:Value, xinfo:Text
    function bleCallback(m, v, xinfo) {
        console.log("BLX: ", m, v, xinfo)
    }
		// Called all sec
		function _blxBusyMonitor() {
		}

		//-------- subsystem for BLX ------------
		// Pattern:
		// await _blxCmdSend(CMD)
		// if(_blxCmdResult) handle error: throw or alert ..
		let _blxCmdResult // Report Result here (OK: 0, else String)
		let _blxCmdBusyFlag = false
		let _blxCmdFreeCnt = 0
		async function _blxCmdSend(cmd, cmdtimeout) {
//x			document.getElementById("blxStateText").textContent = "Busy"
			_blxCmdResult = 0
			_blxCmdBusyFlag = true
			_blxCmdFreeCnt = 0
			try {
				await blx.userSendCmd(cmd, cmdtimeout);
				console.log("CMD->", cmd)
				_blxCmdBusyFlag = false
				_blxCmdFreeCnt = 0
//x				document.getElementById("blxStateText").textContent = "Ready"
			} catch (error) {
				_blxCmdBusyFlag = false
				_blxCmdFreeCnt = 0
//x				document.getElementById("blxStateText").textContent = "ERROR: " + error
				_blxCmdResult = error
			}
		}


        //---------- the buttons ----------------
        // Buton COnnect/Disconnect gedrueckt
		async function blxConnect() {
//x   document.getElementById("blxCmdRes").textContent = '-'
//x   disabler(true)
			try {
				if (connectionLevel >= 3) await _blxCmdSend(".d") // disconnect
				else {
					await _blxCmdSend(".c") // connect
//x					await show_details()
				}
			} catch (error) {
//x				document.getElementById("blxCmdRes").textContent = error
			}
//x			disabler(false)
		}

     //---------------- setup ------------
    function setup() {
        // Isolate URL Parameters
        const qs = location.search.substr(1).split('&')
        var urlpar = {}
        for (let x = 0; x < qs.length; x++) {
            let kv = qs[x].split('=')
            if (kv[1] === undefined) kv[1] = ''
            urlpar[kv[0]] = kv[1]
        }

        blx.setTerminal('blxTerminal', bleCallback) // Initially Show Terminal in div 'blxTerminal'
        //blx.setTerminal(undefined, bleCallback) // Initially Hide Terminal in div 'blxTerminal'
        setInterval(_blxBusyMonitor, 1000)

        document.getElementById('button0-link').addEventListener('click', blxConnect)

        // Scanner Output via Terminal
        QRS.setQrLogPrint(blx.terminalPrint)

    }
    window.addEventListener("load", setup);


</script>

</html>
