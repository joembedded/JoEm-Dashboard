<!DOCTYPE html>
<!-- 
    Dashboards nach aktueller Struktur. 
    Benoetigt Server wenn import oder fetch(). (Dann location.protocol === 'file:' disabled)
    Icons: Font Awesome V6 Free -> https://fontawesome.com/docs/web/style/styling
    (die ganzen fa-beat, fa-spin, ...- Klassen kann man auch auf andere Elemente verwenden)

    Kontakt: joembedded@gmail.com

    Tests: 
    http://localhost/wrk/joemdash/index.html
    https://joembedded.github.io/JoEm-Dashboard/

-->
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta meta property=“og:title“ content=“Dashboard“ />
    <meta property="og:description" content="Template-Fragment for Dashboards" />
    <meta name="description" content="Template-Fragment for Dashboards" />
    <!-- Pfad zeigt auf volle URL (nur dann als Link immer korrekt darstellbar) -->
    <meta property="og:image" content="https://joembedded.github.io/JoEm-Dashboard/static/preview.png" />

    <!-- - App Icon entweder als Icon or SVG: -->
    <link rel="icon" type="image/svg+xml" href="./static/favicon.svg">
    <!-- <link rel="icon" type="image/x-icon" href="./static/favicon.ico">  -->

    <link rel="stylesheet" href="./fontawesome/css/all.min.css">
    <!-- Basis-Funktionalitaet des Dashbords: -->
    <link rel="stylesheet" href="./css/joemdash.css">
    <!-- BarcodeDetector - Scanner-Dialog -->
    <link rel="stylesheet" href="./css/qrscanner.css">

    <title>BLX Dash</title>

</head>

<body class="shcontainer"> <!-- BODY START -->

    <header class="cheader">
        <i class="fa fa-fw fa-bars " id="sidebar_menue"></i>
        <span class="cheader-txt"><b>BLX Dashboard</b></span>
    </header>

    <div class="ccontent">
        <div class="hccontainer">
            <nav id="sidebar_left" class="clnav">
                <div class="navinfo"><b>Main</b></div>

                <button id="button0-link" class="navitem">
                    <i class="fa-brands fa-fw fa-bluetooth"></i>
                    <span class="navitem-txt">Device: LTX012345678</span>
                    <span class="navitem-pointout" style="background-color:green;">
                        -59 dBm
                    </span>
                </button>

                <button class="navitem" disabled>
                    <!-- class="navhidden" for Weg-Hidden.. disabled fuer halbhell, hidden fuer unsichtbar -->
                    <i class="fa-regular fa-fw fa-compass"></i>
                    <span class="navitem-txt">Messen</span>
                </button>

                <div class="thin-hr"></div>

                <button class="navitem">
                    <img src="./static/preview.png" alt="Test">

                </button>

            </nav>

            <div id="main_content" class="ucontent">
                <div id="section_main" class="usection">
                    <div id="section_main_menue"> <!-- Top-Schnellstartleiste -->
                        <button onclick="location.href='#section_terminal'"> <i class="fa-regular fa-keyboard"></i>
                            Terminal</a> </button>
                    </div>
                    MainContent<br>
                    <button id="testping">PING</button>
                    <button id="testscan">SCAN</button>

                </div>

                <div id="section_terminal" class="usection">
                    <div id="section_teminal_menue"> <!-- Top-Schnellstartleiste -->
                        <button onclick="location.href='#section_main'"> <i class="fa-solid fa-house"></i>
                            Top</a> </button>
                    </div>
                    Terminal
                    <div id="terminal"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="cfooter">
        Footer
    </footer>

    <!-- Dialog Elements <dialog> / Modal new in HTML5 -->
    <dialog id='qrscanner-dialog'>
        <video style="display: none;" id='qroriginal-video' playsinline mute></video>
        <div id='qrvideo-header'><select id='qrcam-selector'></select></div>
        <button id='qrscanner-btnClose'>&#10006;</button>
        <button id='qrscanner-btnTorch'>&#x1F4A1;</button>
        <div style='text-align:center;'><canvas id='qrscaled-videocanvas'></canvas></div>
    </dialog>

</body> <!-- BODY END -->

<script type="module">
    import * as JD from './js/joemdash.js'
    import * as QRS from './js/qrscanner.js'
    import './js/jsQR.min.js' // Polyfill for Desktop
    import * as I18 from './js/i18n.js'
    import './js/blx.js' // './js/blx.min.js'

    function testping() {
        blx.chordsound(440, 1, 0.1)

        let b = document.getElementById('button0-link')
        console.log(b.querySelector('i').classList.toggle('fa-beat'))

    }
    document.getElementById('testping').addEventListener('click', testping)

    async function testscan() {
        QRS.clearScannedResults()
        await QRS.openSelectedCamera() // Implizit initCameras falls noetig, nicht aber beide!
        await QRS.scannerBusy()
    }
    document.getElementById('testscan').addEventListener('click', testscan)

</script>

</html>
