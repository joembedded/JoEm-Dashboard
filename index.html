<!DOCTYPE html>
<!-- 
    Template-Fragment fuer Dashboards nach aktueller Struktur. 
    Benoetigt Server wenn import oder fetch(). (Dann location.protocol === 'file:' disabled)
    Layout ist etwas komplizierter da Menueliste scrollbar und Footer eingebaut.
    
    Icons: Font Awesome V6 Free -> https://fontawesome.com/docs/web/style/styling

    Kontakt: joembedded@gmail.com
-->
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta meta property=“og:title“ content=“Dashboard“ />
    <meta property="og:description" content="Template-Fragment for Dashboards" />
    <meta name="description" content="Template-Fragment for Dashboards" />
    <!-- Pfad zeigt auf volle URL (nur dann als Link immer korrekt darstellbar) -->
    <meta property="og:image" content="https://joembedded.github.io/joemdash/static/preview.png" />

    <!-- - App Icon entweder als Icon or SVG: -->
    <link rel="icon" type="image/svg+xml" href="./static/favicon.svg">
    <!-- <link rel="icon" type="image/x-icon" href="./static/favicon.ico">  -->

    <link rel="stylesheet" href="./fontawesome/css/all.min.css">
    <!-- Basis-Funktionalitaet des Dashbords: -->
    <link rel="stylesheet" href="./css/joemdash.css">
    <script src="./js/joemdash.js"></script>
    <!-- Internationalisation -->
    <script src="./js/i18n.js"></script>


    <title>Dashboard-Template</title>

</head>

<body class="shcontainer"> <!-- BODY START -->

    <header class="cheader">
        <i class="fa fa-fw fa-bars " id="sidebar_menue"></i>
        <span class="cheader-txt"><b>Dashboard-Template</b> JoEmbedded
            JoEmbedded</span>
    </header>

    <div class="ccontent">
        <div class="hccontainer">
            <nav id="sidebar_left" class="clnav">

                <button class="navitem">
                    <i class="fa-brands fa-fw fa-bluetooth fa-beat"></i>
                    <span class="navitem-txt">Device: LTX012345678</span>
                    <span class="navitem-pointout" style="background-color:green;">LINK</span>
                </button>

                <button class="navitem" >  <!-- class="navhidden" for Hidden.. -->
                    <i class="fa-regular fa-fw fa-compass"></i>
                    <span class="navitem-txt">Parameter</span>
                </button>

                <button class="navitem" >  <!-- class="navhidden" for Hidden.. -->
                    <i class="fa-solid fa-fw fa-upload"></i>
                    <span class="navitem-txt">Parameter</span>
                    <span class="navitem-simple-pointout">33K</span>
                </button>

                <button class="navitem" >  <!-- class="navhidden" for Hidden.. -->
                    <i class="fa fa-fw fa-wrench"></i>
                    <span class="navitem-txt">Parameter</span>
                </button>

                <button class="navitem" >  <!-- class="navhidden" for Hidden.. -->
                    <i class="fa-solid fa-fw fa-screwdriver-wrench"></i>
                    <span class="navitem-txt">Setup</span>
                </button>

                

                <div class="thin-hr"></div>
                <div class="navinfo"><b>Interne Funktionen</b></div>

                <button class="navitem">
                    <i class="fa fa-fw fa-bell fa-shake" style="color:darkred"></i>
                    <span class="navitem-txt">Alarms</span>
                    <span class="navitem-pointout" style="background-color:red">99</span>
                </button>
                <button class="navitem">
                    <i class="fa-regular fa-fw fa-keyboard"></i>
                    <span class="navitem-txt">Terminal</span>
                    <span class="navitem-simple-pointout">33</span>
                </button>

                <div class="thin-hr"></div>
                <div class="navinfo"><b>Dies und Das</b></div>

                <button class="navitem" style="color:blue">
                    <i class="fa fa-fw fa-circle-plus"></i>
                    <span class="navitem-txt">Gerät hinzufügen</span>
                </button>
                <button class="navitem">
                    <img src="./static/preview.png" alt="Test">
                    <span class="navitem-txt">Logo</span>
                    <span class="navitem-pointout" style="background-color:green;">Online</span>
                </button>

                <button class="navitem">
                    <i class="fa fa-fw">&#x1F3E1;</i>
                    <span class="navitem-txt">Haus mit Garten</span>
                    <span class="navitem-simple-pointout">1</span>
                </button>
            </nav>

            <div id="main_content" class="ucontent">
                <div id="sect1" class="usection">
                    <a href="#sect1">
                    <a href="#sect2">Click Scroll to Section 2</a>


                    <br>
                    <br>
                    <button onclick="dashToggleTheme()">Toggle Thema</button><br><br>
                    <br>

                    <button onclick="document.documentElement.style.setProperty('--fontrel', 0.5)">Font 0.5</button><br><br>
                    <button onclick="document.documentElement.style.setProperty('--fontrel', 0.75)">Font 0.75</button><br><br>
                    <button onclick="document.documentElement.style.setProperty('--fontrel', 1)">Font 1</button><br><br>
                    <button onclick="document.documentElement.style.setProperty('--fontrel', 1.5)">Font 1.5</button><br><br>
                    <button onclick="document.documentElement.style.setProperty('--fontrel', 2)">Font 2</button><br><br>
                    <br>

                    <button onclick="i18localize('de')">Deutsch DE</button><br><br>
                    <button onclick="i18localize('en')">Englisch EN</button><br><br>

                    <br>
                    <br>

                    <p ll="block.title">Titel1</p>
                    <p ll="block.subtitle">Titel2</p>
                    <p ll="p-1">Zeile1</p>
                    <p ll="p-2">Zeile1</p>
                </div>

                <div class="thin-hr"></div>

                <div id="sect2" class="usection">
                    <a href="#sect2">
                    <a href="#sect1">Click Scroll to Section 1</a>
                </div>

            </div>
        </div>
    </div>

    <footer class="cfooter">
        Footer-Line fuer Infos...
    </footer>

</body> <!-- BODY END -->

<script> // interne Verwaltung
</script>


</html>
