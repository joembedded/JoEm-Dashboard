<!DOCTYPE html>
<!-- 
    Allgemeines Template Seitenfuellend 
    CSS: W3.CSS 
    Benoetigt (lokalen) Server, da getch()-API und Module nicht via FILE laufen

    import ud fetch demos
-->
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./favicon.ico">

    <title>WRK</title>

    <link rel="stylesheet" href="./css/w3.css"> <!-- W3.CSS 4.15 December 2020 https://www.w3schools.com/-->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            border: 0px;
        }
    </style>
</head>

<body>
    <!-- Das im_main fuellt die maximale Flache ohne Scrollbars-->
    <div id="id_main" style="border: solid 1px black;">
        *** id_main ***
    </div>
    
    <canvas id="c"></canvas>

    <!-- Logbereich -->
    <div id="id_log_header" style="border: solid 1px blue;">
        <div style="background-color: lightskyblue;">*** Log
            <button id="btn_clearlog">Clear Log</button>
            <button id="btn_dbg_action">Debg.-Action</button>
            ***
        </div>
        <pre id="id_log" style="background-color: lightcyan;"></pre>
    </div>
</body>

<script type="importmap">
    {
      "imports": {
        "blx": "./js/blx.js",
        "blStore": "./js/blStore.js",
        "three": "./js/three/build/three.module.js",
        "three-demo": "./js/threejs-responsive.js",
        "test": "./js/test_js.js"
      }
    }
</script>

<script type="module">

    // --START Ab hier OK NUR mit Server, nicht aber mit file:// --
    import * as TEST from 'test'; 
    import 'blx'; // Keine Fkts.
    import 'blStore'; // Keine Fkts.

    // import 'three-demo'; // main()

    function xtest() {
        const myText = TEST.test()
        document.getElementById("id_main").innerHTML = myText
    }
    // fetch-API-Test. Bei Fehlern ent. myText die Fehlermeldung des Servers
    async function getText(file) {
        let myObject = await fetch(file)
        let myText = await myObject.text()
        document.getElementById("id_main").innerHTML = myText
    }
    // --ENDE NUR mit Server

    //--- Nach Laden ausfuehren ---
    let log_lines = []
    let log_lcnt = 0
    let log_maxlines = 20

    let urlpar = []

    function log_print(txt) {
        while (log_lines.length > log_maxlines) log_lines.pop()
        log_lines.unshift(`${log_lcnt++}: ${txt}`)
        document.getElementById("id_log").innerText = log_lines.join("\n")
    }
    function log_clear() {
        log_lines = []
        document.getElementById("id_log").innerText = ""
    }
    async function log_dbg_action() {
        log_print("Action Start")
        await getText("./static/fetch_test_text.txt"); // Server
        xtest() // Server
        log_print("Action Fertig")
    }

    async function init() {
        // Isolate URL Parameters
        var qs = location.search.substr(1).split('&')
        var urlpar = {}
        for (var x = 0; x < qs.length; x++) {
            var kv = qs[x].split('=')
            if (kv[1] === undefined) kv[1] = ''
            urlpar[kv[0]] = kv[1]
        }
        //console.log(urlpar)
        //console.log(location)

        document.getElementById("btn_clearlog").addEventListener("click", log_clear)
        document.getElementById("btn_dbg_action").addEventListener("click", log_dbg_action)

            console.log("BLX: "+blx.version)
            console.log("BLSTORE: "+blStore.version)

          try {
            const blxId = await blx.userSendCmd("v")
            console.log(blxId)
        } catch (err) {
            log_print(`BLX-Msg: ${err}`)
        }

    }

    init()

</script>

</html>
